<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Decisio Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0F14;
  --surface: #121821;
  --elevated: rgba(22,31,43,0.82);
  --pink: #FF4E6A;
  --purple: #7C5CFF;
  --t1: #E6EDF3;
  --t2: #9FB0C0;
  --t3: #5C6B7A;
  --grad: linear-gradient(135deg, #FF4E6A, #7C5CFF);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* ambient glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(255,78,106,0.065) 0%, transparent 70%);
  top: -100px; right: -80px;
}
.orb-2 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(124,92,255,0.055) 0%, transparent 70%);
  bottom: 100px; left: -60px;
}

/* HEADER */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(11,15,20,0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.045);
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-title {
  font-family: 'DM Serif Display', serif;
  font-size: 21px; font-weight: 400; letter-spacing: -0.2px;
}
.hdr-title em {
  font-style: normal;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-count {
  font-size: 12px; font-weight: 400; color: var(--t3);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px; padding: 2px 9px;
  display: none;
}
.btn-reset {
  background: none; border: none;
  font-family: inherit; font-size: 12px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--t3); cursor: pointer;
  padding: 8px 12px; border-radius: 8px;
  transition: color .2s, background .2s;
  min-height: 40px;
}
.btn-reset:hover { color: var(--t2); background: rgba(255,255,255,0.04); }

/* MAIN */
.main {
  position: relative; z-index: 1;
  padding: 96px 16px 190px;
  max-width: 560px;
  margin: 0 auto;
}

/* INPUT CARD */
.input-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--r-xl);
  padding: 20px 20px 22px;
  margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.input-card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,78,106,0.35), rgba(124,92,255,0.35), transparent);
}
.input-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--t3);
  margin-bottom: 14px;
}
.input-row { display: flex; gap: 10px; margin-bottom: 22px; }
.name-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--r-md); color: var(--t1);
  font-family: inherit; font-size: 15px; font-weight: 400;
  padding: 13px 16px; outline: none; min-height: 50px;
  transition: border-color .2s, background .2s;
  -webkit-appearance: none;
}
.name-input::placeholder { color: var(--t3); }
.name-input:focus {
  border-color: rgba(255,78,106,0.4);
  background: rgba(255,78,106,0.04);
}
.btn-add {
  background: var(--grad);
  border: none; border-radius: var(--r-md);
  color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
  padding: 13px 22px; cursor: pointer;
  min-height: 50px; min-width: 80px;
  box-shadow: 0 4px 22px rgba(255,78,106,0.28);
  transition: transform .12s, filter .15s, box-shadow .15s;
}
.btn-add:hover { filter: brightness(1.1); }
.btn-add:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255,78,106,0.15); }

/* SLIDERS */
.sliders-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.slider-lbl { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
.slider-name { font-size: 11px; color: var(--t3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.slider-val { font-size: 16px; font-weight: 600; color: var(--t1); }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.07); cursor: pointer; outline: none; border: none;
  padding: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg,#FF4E6A,#7C5CFF);
  box-shadow: 0 0 10px rgba(255,78,106,0.4);
  cursor: pointer; border: none;
  transition: transform .1s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.18); }
input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg,#FF4E6A,#7C5CFF); border: none; cursor: pointer;
}

/* SECTION HDR */
.section-hdr {
  display: none; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-hdr.visible { display: flex; }
.section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); }
.section-sub { font-size: 12px; color: rgba(255,78,106,0.75); font-weight: 400; }

/* RESULT */
.result-wrap { margin-bottom: 18px; }
@keyframes resultIn {
  from { opacity:0; transform: scale(0.94) translateY(10px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.result-card {
  background: var(--surface);
  border: 1px solid rgba(255,78,106,0.22);
  border-radius: var(--r-xl);
  padding: 30px 24px 26px;
  text-align: center;
  position: relative; overflow: hidden;
  animation: resultIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
.result-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(255,78,106,0.1) 0%, transparent 60%);
}
.result-shimmer {
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: var(--grad); opacity: .65;
}
.result-eye { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--pink); margin-bottom: 14px; font-weight: 500; position: relative; }
.result-name {
  font-family: 'DM Serif Display', serif;
  font-size: 27px; color: var(--t1); margin-bottom: 14px;
  position: relative; line-height: 1.25;
}
.result-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; position: relative; }
.result-pill {
  font-size: 13px; color: var(--t2); font-weight: 300;
  background: rgba(255,255,255,0.05); border-radius: 20px;
  padding: 4px 14px;
}

/* OPTIONS LIST */
.options-list { display: flex; flex-direction: column; gap: 10px; }

/* OPTION ITEM */
@keyframes slideUp {
  from { opacity:0; transform: translateY(18px) scale(.98); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes fadeOut {
  from { opacity:1; transform: translateY(0) scale(1); max-height:120px; margin-bottom:10px; }
  to   { opacity:0; transform: translateY(10px) scale(.97); max-height:0; margin-bottom:0; }
}
.opt-item {
  background: var(--elevated);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; position: relative; overflow: hidden;
  touch-action: pan-y; user-select: none; -webkit-user-select: none;
  transition: border-color .2s, background .2s;
  will-change: transform, opacity;
}
.opt-item.entering { animation: slideUp .25s cubic-bezier(.34,1.56,.64,1) forwards; }
.opt-item.eliminating { animation: fadeOut .2s cubic-bezier(.4,0,1,1) forwards; pointer-events: none; }
.opt-item.is-top::after {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: radial-gradient(ellipse at 15% 50%, rgba(255,78,106,0.07) 0%, transparent 55%);
  pointer-events: none;
}
.opt-item.is-selected {
  border-color: rgba(124,92,255,0.38);
  background: rgba(124,92,255,0.07);
}
.opt-rank {
  font-size: 11px; font-weight: 600; color: var(--t3);
  min-width: 22px; flex-shrink: 0; letter-spacing: .04em;
}
.opt-rank.top { color: var(--pink); }
.opt-body { flex: 1; min-width: 0; }
.opt-name { font-size: 15px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; line-height: 1.3; }
.opt-meta { display: flex; gap: 8px; }
.opt-meta-item { font-size: 12px; color: var(--t3); font-weight: 300; }
.opt-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* score ring */
.score-ring { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.score-ring svg { width: 42px; height: 42px; transform: rotate(-90deg); display: block; }
.ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 2.5; }
.ring-fill { fill: none; stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1); }
.ring-fill.rf-top { stroke: url(#ringGrad); }
.ring-fill.rf-mid { stroke: rgba(124,92,255,0.65); }
.ring-fill.rf-low { stroke: rgba(255,255,255,0.12); }
.score-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--t2);
  letter-spacing: -0.3px; line-height: 1;
}

.btn-del {
  background: none; border: none;
  color: var(--t3); cursor: pointer;
  padding: 0; width: 36px; height: 36px;
  border-radius: 8px; font-size: 14px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s, color .15s, background .15s;
}
.opt-item:hover .btn-del,
.opt-item.is-selected .btn-del { opacity: 1; }
.btn-del:hover { color: var(--pink); background: rgba(255,78,106,0.1); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 56px 24px; }
.empty-icon { font-size: 36px; opacity: .25; display: block; margin-bottom: 18px; }
.empty-text { font-size: 15px; font-weight: 300; color: var(--t3); line-height: 1.7; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(11,15,20,0.98) 55%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: none;
  max-width: 560px;
  margin: 0 auto;
  left: 50%; transform: translateX(-50%);
}
.bottom-bar.visible { display: block; }
.btn-elim {
  width: 100%;
  background: var(--grad);
  border: none; border-radius: var(--r-lg);
  color: #fff; font-family: inherit;
  font-size: 16px; font-weight: 600;
  padding: 0 24px;
  height: 58px;
  cursor: pointer;
  box-shadow: 0 0 36px rgba(255,78,106,0.22), 0 8px 28px rgba(255,78,106,0.18);
  transition: transform .12s, box-shadow .18s, filter .15s, opacity .2s;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-elim:hover { filter: brightness(1.08); }
.btn-elim:active { transform: scale(0.97); box-shadow: 0 2px 14px rgba(255,78,106,0.12); }
.btn-elim:disabled { opacity: .28; cursor: not-allowed; box-shadow: none; filter: none; transform: none; }
.btn-elim-text { position: relative; z-index: 1; }
.weak-chip {
  position: relative; z-index: 1;
  font-size: 12px; font-weight: 400;
  background: rgba(11,15,20,0.45);
  border-radius: 20px; padding: 3px 10px;
  max-width: 110px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  display: none;
}

/* TOAST */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(22,31,43,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 22px; padding: 10px 20px;
  font-size: 13px; color: var(--t2); font-weight: 300;
  z-index: 200; opacity: 0;
  transition: opacity .2s, transform .2s;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* DESKTOP */
@media (min-width: 600px) {
  .main { padding-top: 112px; }
  .header { padding: 22px 32px 20px; }
  .bottom-bar { padding: 20px 32px calc(24px + env(safe-area-inset-bottom)); }
  .btn-del { opacity: .55; }
  .input-card { padding: 26px 26px 28px; border-radius: 32px; }
  .opt-item { border-radius: 20px; padding: 18px 20px; }
}

@keyframes shakeFx {
  0%   { transform: translateX(0); }
  18%  { transform: translateX(-6px); }
  36%  { transform: translateX(5px); }
  54%  { transform: translateX(-4px); }
  72%  { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
.shake { animation: shakeFx .28s ease; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4E6A"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>
</svg>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="header">
  <div class="hdr-left">
    <div class="hdr-title">Decisio <em>Flow</em></div>
    <div class="hdr-count" id="hdr-count"></div>
  </div>
  <button class="btn-reset" id="btn-reset">Reset</button>
</header>

<main class="main">
  <div class="input-card">
    <div class="input-label">New Option</div>
    <div class="input-row">
      <input class="name-input" type="text" id="opt-name" placeholder="What's the option?" autocomplete="off" spellcheck="false">
      <button class="btn-add" id="btn-add">Add</button>
    </div>
    <div class="sliders-grid">
      <div>
        <div class="slider-lbl">
          <span class="slider-name">Impact</span>
          <span class="slider-val" id="v-impact">3</span>
        </div>
        <input type="range" id="s-impact" min="1" max="5" value="3" step="1">
      </div>
      <div>
        <div class="slider-lbl">
          <span class="slider-name">Time</span>
          <span class="slider-val" id="v-time">3</span>
        </div>
        <input type="range" id="s-time" min="1" max="5" value="3" step="1">
      </div>
      <div>
        <div class="slider-lbl">
          <span class="slider-name">Effort</span>
          <span class="slider-val" id="v-effort">3</span>
        </div>
        <input type="range" id="s-effort" min="1" max="5" value="3" step="1">
      </div>
    </div>
  </div>

  <div class="section-hdr" id="section-hdr">
    <div class="section-title">Options</div>
    <div class="section-sub" id="section-sub"></div>
  </div>

  <div class="result-wrap" id="result-wrap"></div>
  <div class="options-list" id="options-list">
    <div class="empty-state">
      <span class="empty-icon">◎</span>
      <div class="empty-text">Add two or more options<br>to start deciding</div>
    </div>
  </div>
</main>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn-elim" id="btn-elim" disabled>
    <span class="btn-elim-text">Eliminate Weakest</span>
    <span class="weak-chip" id="weak-chip"></span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const R = 17.5;
  const CIRC = 2 * Math.PI * R;

  let options = [];
  let selectedId = null;
  let uid = 0;

  function score(o) {
    return (o.impact * 0.5) + ((6 - o.time) * 0.3) + ((6 - o.effort) * 0.2);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function addOption() {
    const nameEl = document.getElementById('opt-name');
    const name = nameEl.value.trim();
    if (!name) {
      nameEl.classList.remove('shake');
      void nameEl.offsetWidth;
      nameEl.classList.add('shake');
      setTimeout(() => nameEl.classList.remove('shake'), 300);
      return;
    }
    const impact = +document.getElementById('s-impact').value;
    const time   = +document.getElementById('s-time').value;
    const effort = +document.getElementById('s-effort').value;
    options.push({ id: ++uid, name, impact, time, effort, score: 0, entering: true });
    options[options.length-1].score = score(options[options.length-1]);
    nameEl.value = '';
    nameEl.focus();
    render();
    requestAnimationFrame(() => {
      options[options.length-1].entering = false;
    });
  }

  function eliminateWeakest() {
    if (options.length <= 1) return;
    const sorted = [...options].sort((a,b) => a.score - b.score);
    const weak = sorted[0];
    selectedId = null;
    const el = document.querySelector(`.opt-item[data-id="${weak.id}"]`);
    if (el) {
      el.classList.add('eliminating');
      setTimeout(() => {
        options = options.filter(o => o.id !== weak.id);
        render();
      }, 210);
    } else {
      options = options.filter(o => o.id !== weak.id);
      render();
    }
  }

  function removeOption(id) {
    const el = document.querySelector(`.opt-item[data-id="${id}"]`);
    if (el) {
      el.classList.add('eliminating');
      setTimeout(() => {
        options = options.filter(o => o.id !== id);
        if (selectedId === id) selectedId = null;
        render();
      }, 210);
    } else {
      options = options.filter(o => o.id !== id);
      if (selectedId === id) selectedId = null;
      render();
    }
  }

  function resetAll() {
    options = [];
    selectedId = null;
    render();
    document.getElementById('opt-name').focus();
    showToast('Reset');
  }

  function ringHTML(sc, cls) {
    const minS = 1.5, maxS = 4.5;
    const pct = Math.max(0, Math.min(1, (sc - minS) / (maxS - minS)));
    const offset = (CIRC * (1 - pct)).toFixed(2);
    return `<svg viewBox="0 0 42 42"><circle class="ring-track" cx="21" cy="21" r="${R}"/><circle class="ring-fill ${cls}" cx="21" cy="21" r="${R}" stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="${offset}"/></svg><div class="score-label">${sc.toFixed(1)}</div>`;
  }

  function render() {
    const listEl   = document.getElementById('options-list');
    const hdrEl    = document.getElementById('section-hdr');
    const subEl    = document.getElementById('section-sub');
    const resultEl = document.getElementById('result-wrap');
    const barEl    = document.getElementById('bottom-bar');
    const elimBtn  = document.getElementById('btn-elim');
    const countEl  = document.getElementById('hdr-count');
    const chipEl   = document.getElementById('weak-chip');

    // count badge
    if (options.length > 0) {
      countEl.style.display = '';
      countEl.textContent = options.length;
    } else {
      countEl.style.display = 'none';
    }

    // result
    resultEl.innerHTML = '';
    if (options.length === 1) {
      const w = options[0];
      resultEl.innerHTML = `<div class="result-card"><div class="result-shimmer"></div><div class="result-eye">Decision Reached</div><div class="result-name">${esc(w.name)}</div><div class="result-pills"><span class="result-pill">Score ${w.score.toFixed(2)}</span><span class="result-pill">Impact ${w.impact}</span><span class="result-pill">Time ${w.time}</span><span class="result-pill">Effort ${w.effort}</span></div></div>`;
    }

    if (options.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><span class="empty-icon">◎</span><div class="empty-text">Add two or more options<br>to start deciding</div></div>';
      hdrEl.classList.remove('visible');
      barEl.classList.remove('visible');
      return;
    }

    hdrEl.classList.add('visible');
    barEl.classList.add('visible');

    const sorted = [...options].sort((a,b) => b.score - a.score);

    if (options.length > 1) {
      elimBtn.disabled = false;
      const weak = sorted[sorted.length-1];
      chipEl.style.display = '';
      chipEl.textContent = weak.name.length > 13 ? weak.name.slice(0,13)+'…' : weak.name;
      subEl.textContent = '↓ ' + (weak.name.length > 18 ? weak.name.slice(0,18)+'…' : weak.name);
    } else {
      elimBtn.disabled = true;
      chipEl.style.display = 'none';
      subEl.textContent = '';
    }

    listEl.innerHTML = sorted.map((opt, i) => {
      const isTop = i === 0 && options.length > 1;
      const isLow = i === sorted.length - 1 && options.length > 1;
      const rfCls = isTop ? 'rf-top' : isLow ? 'rf-low' : 'rf-mid';
      const isSel = opt.id === selectedId;
      return `<div class="opt-item${opt.entering ? ' entering':''} ${isTop ? 'is-top':''} ${isSel ? 'is-selected':''}" data-id="${opt.id}">
        <div class="opt-rank ${isTop ? 'top' : ''}">#${i+1}</div>
        <div class="opt-body">
          <div class="opt-name">${esc(opt.name)}</div>
          <div class="opt-meta">
            <span class="opt-meta-item">I ${opt.impact}</span>
            <span class="opt-meta-item">·</span>
            <span class="opt-meta-item">T ${opt.time}</span>
            <span class="opt-meta-item">·</span>
            <span class="opt-meta-item">E ${opt.effort}</span>
          </div>
        </div>
        <div class="opt-right">
          <div class="score-ring">${ringHTML(opt.score, rfCls)}</div>
          <button class="btn-del" data-id="${opt.id}" aria-label="Remove">✕</button>
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.opt-item').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('.btn-del')) return;
        const id = +el.dataset.id;
        selectedId = selectedId === id ? null : id;
        render();
      });
      initSwipe(el);
    });
    listEl.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); removeOption(+btn.dataset.id); });
    });
  }

  function initSwipe(el) {
    let sx = 0, dx = 0, active = false;
    const THRESH = 72;

    el.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      active = true;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!active) return;
      dx = e.touches[0].clientX - sx;
      if (dx < 0) {
        const clamped = Math.max(dx, -THRESH * 1.3);
        el.style.transform = `translateX(${clamped}px)`;
      }
    }, { passive: true });

    el.addEventListener('touchend', () => {
      active = false;
      if (dx < -THRESH) {
        el.style.transition = 'transform .15s ease, opacity .15s ease';
        el.style.transform = 'translateX(-110%)';
        el.style.opacity = '0';
        setTimeout(() => removeOption(+el.dataset.id), 160);
      } else {
        el.style.transition = 'transform .28s cubic-bezier(.34,1.56,.64,1)';
        el.style.transform = '';
        setTimeout(() => { el.style.transition = ''; }, 300);
      }
      dx = 0;
    });
  }

  // WIRE UP
  document.getElementById('btn-add').addEventListener('click', addOption);
  document.getElementById('btn-elim').addEventListener('click', eliminateWeakest);
  document.getElementById('btn-reset').addEventListener('click', resetAll);

  document.getElementById('opt-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addOption(); }
    if (e.key === 'Backspace' && e.target.value === '' && options.length > 0) {
      removeOption(options[options.length-1].id);
    }
  });

  ['s-impact','s-time','s-effort'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      document.getElementById('v-' + id.slice(2)).textContent = this.value;
    });
  });

  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    const isInput = tag === 'INPUT' || tag === 'TEXTAREA';
    if (e.key === ' ' && !isInput) { e.preventDefault(); eliminateWeakest(); }
    if ((e.key === 'r' || e.key === 'R') && !isInput) resetAll();
    if (e.key === 'Delete' && !isInput && selectedId !== null) removeOption(selectedId);
  });

  render();
})();
</script>
</body>
</html>
