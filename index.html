<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrawkiFlow — Your Tools, One Place</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --flowly: #c8f135;
    --drawki: #7c6ff7;
    --drawki-pink: #e8547a;
    --tempo: #ff6b2b;
    --tempo-gold: #ffd166;
    --bg: #080810;
    --border: rgba(255,255,255,0.08);
  }

  html, body { width:100%; height:100%; overflow:hidden; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: none;
    position: relative;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor {
    position:fixed; width:10px; height:10px;
    border-radius:50%; background:white;
    pointer-events:none; z-index:9999;
    mix-blend-mode:difference;
  }
  .cursor-ring {
    position:fixed; width:32px; height:32px;
    border-radius:50%; border:1px solid rgba(255,255,255,0.35);
    pointer-events:none; z-index:9998;
    transition: transform 0.22s ease, opacity 0.22s ease;
  }

  /* ── AURORA BG ── */
  .aurora { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .aurora-blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; animation:drift ease-in-out infinite alternate; }
  .a1 { width:600px;height:500px; background:var(--flowly); top:-100px;left:-150px; animation-duration:14s; }
  .a2 { width:500px;height:400px; background:var(--drawki); bottom:-80px;right:-100px; animation-duration:18s; animation-delay:-6s; }
  .a3 { width:350px;height:350px; background:var(--tempo); top:50%;left:50%; transform:translate(-50%,-50%); animation-duration:10s; animation-delay:-3s; opacity:0.07; }
  .a4 { width:300px;height:300px; background:var(--tempo-gold); bottom:10%;right:30%; animation-duration:22s; animation-delay:-9s; opacity:0.06; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px,30px) scale(1.08); }
  }

  /* ── GRID ── */
  .grid {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── NOISE ── */
  body::after {
    content:''; position:fixed; inset:0; z-index:2; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.5;
  }

  /* ── FLOATING PARTICLES ── */
  .particles { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
  .p-dot { position:absolute; border-radius:50%; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0%   { transform:translateY(0) scale(1); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.5; }
    100% { transform:translateY(-105vh) scale(0.4); opacity:0; }
  }

  /* ── CORNER MARKS ── */
  .corner { position:fixed; z-index:20; width:28px; height:28px; }
  .corner svg line { stroke:rgba(255,255,255,0.12); stroke-width:1; }
  .corner-tl { top:18px; left:18px; }
  .corner-tr { top:18px; right:18px; transform:rotate(90deg); }
  .corner-bl { bottom:18px; left:18px; transform:rotate(-90deg); }
  .corner-br { bottom:18px; right:18px; transform:rotate(180deg); }

  /* ── SIDE LABELS ── */
  .side-label {
    position:fixed; z-index:20;
    font-family:'JetBrains Mono', monospace; font-size:8px;
    letter-spacing:0.3em; writing-mode:vertical-rl;
    text-orientation:mixed; opacity:0.2;
    top:50%;
  }
  .side-label.left  { left:22px;  color:var(--flowly); transform:translateY(-50%) rotate(180deg); }
  .side-label.right { right:22px; color:var(--tempo);  transform:translateY(-50%); }

  /* ── GITHUB BUTTON ── */
  .github-btn {
    position:fixed; top:18px; right:18px; z-index:50;
    display:flex; align-items:center; gap:8px;
    padding:7px 14px 7px 11px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:999px;
    color:rgba(255,255,255,0.6);
    font-family:'Outfit', sans-serif; font-size:12px; font-weight:500;
    text-decoration:none; cursor:pointer;
    backdrop-filter:blur(12px);
    transition:all 0.3s ease;
    animation:slideDown 0.6s 0.5s both;
  }
  .github-btn:hover {
    background:rgba(255,255,255,0.1);
    border-color:rgba(255,255,255,0.25);
    color:white; transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
  .gh-badge {
    font-family:'JetBrains Mono',monospace; font-size:9px;
    color:var(--flowly); background:rgba(200,241,53,0.08);
    border:1px solid rgba(200,241,53,0.2);
    border-radius:999px; padding:2px 7px;
  }
  .github-btn:hover .gh-badge { background:rgba(200,241,53,0.15); border-color:rgba(200,241,53,0.4); }

  @keyframes slideDown {
    from { opacity:0; transform:translateY(-12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── MAIN WRAPPER ── */
  .wrapper {
    position:relative; z-index:20;
    display:flex; flex-direction:column;
    align-items:center; gap:18px;
    animation:riseUp 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes riseUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.45em;
    text-transform:uppercase; color:rgba(255,255,255,0.25);
    text-align:center;
    animation: fadeIn 0.8s 0.1s both;
  }

  /* ── BRAND LOGO ── */
  .brand {
    display:flex; align-items:baseline; gap:0;
    line-height:1;
    animation: letterPop 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both;
  }
  .brand-drawki {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 110px);
    letter-spacing: -0.01em;
    background: linear-gradient(110deg, var(--drawki) 0%, var(--drawki-pink) 55%, var(--flowly) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(124,111,247,0.35));
  }
  .brand-flow {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 110px);
    letter-spacing: -0.01em;
    background: linear-gradient(110deg, var(--flowly) 0%, #9ef53a 40%, var(--tempo-gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(200,241,53,0.3));
  }
  .brand-dot {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(20px, 3.5vw, 44px);
    color: rgba(255,255,255,0.15);
    margin: 0 4px;
    align-self: center;
    -webkit-text-fill-color: rgba(255,255,255,0.15);
  }
  @keyframes letterPop {
    from { opacity:0; transform:translateY(24px) skewX(-4deg); }
    to   { opacity:1; transform:translateY(0) skewX(0); }
  }

  /* ── TAGLINE ── */
  .tagline {
    display:flex; align-items:center; gap:10px;
    animation: fadeIn 0.8s 0.35s both;
  }
  .tagline-word {
    font-family:'JetBrains Mono', monospace;
    font-size: clamp(9px, 1.1vw, 12px);
    letter-spacing:0.3em;
    text-transform:uppercase;
  }
  .tw-flowly { color:var(--flowly); }
  .tw-drawki { color:var(--drawki); }
  .tw-tempo  { color:var(--tempo); }
  .tagline-sep { width:28px; height:1px; background:rgba(255,255,255,0.12); }

  /* ── PILL BADGES ── */
  .badges {
    display:flex; align-items:center; gap:10px;
    animation: fadeIn 0.8s 0.5s both;
  }
  .badge {
    font-family:'JetBrains Mono', monospace;
    font-size:9px; letter-spacing:0.2em;
    padding:5px 14px; border-radius:999px;
    border:1px solid; text-transform:uppercase;
  }
  .badge-flowly { color:var(--flowly); border-color:rgba(200,241,53,0.25); background:rgba(200,241,53,0.06); }
  .badge-drawki { color:var(--drawki); border-color:rgba(124,111,247,0.25); background:rgba(124,111,247,0.06); }
  .badge-tempo  { color:var(--tempo);  border-color:rgba(255,107,43,0.25);  background:rgba(255,107,43,0.06); }

  /* ── BOTTOM TAG ── */
  .bottom-tag {
    font-family:'JetBrains Mono', monospace;
    font-size:8px; letter-spacing:0.35em;
    color:rgba(255,255,255,0.1); text-align:center;
    animation: fadeIn 0.8s 0.65s both;
  }
  .bottom-tag span { color:rgba(255,255,255,0.2); }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ══════════════════════
     DOCK
  ══════════════════════ */
  .dock-outer {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    height: 96px;
  }
  .dock-panel {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 0 14px 10px;
    background: rgba(12,12,22,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    height: 72px;
  }
  .dock-item {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.09);
    text-decoration: none;
    cursor: pointer;
    flex-shrink: 0;
    overflow: visible;
    transition: border-color 0.2s;
  }
  .dock-item:hover { border-color: rgba(255,255,255,0.2); }
  .dock-item svg { pointer-events: none; display: block; }
  .dock-label {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    white-space: nowrap;
    background: rgba(10,10,20,0.94);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
    backdrop-filter: blur(8px);
  }
  .dock-item:hover .dock-label { opacity:1; transform:translateX(-50%) translateY(0); }
  .dock-sep {
    width: 1px; height: 38px;
    background: rgba(255,255,255,0.08);
    align-self: center; flex-shrink: 0; margin: 0 2px;
  }
  .dock-dot {
    position: absolute;
    bottom: -6px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%; opacity: 0.55;
  }
</style>
</head>
<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- AURORA -->
<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
  <div class="aurora-blob a4"></div>
</div>

<!-- GRID -->
<div class="grid"></div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- CORNERS -->
<div class="corner corner-tl"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-tr"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-bl"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-br"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>

<!-- SIDE LABELS -->
<div class="side-label left">FLOWLY · DRAWKI · TEMPO</div>
<div class="side-label right">DRAWKIFLOW · SUITE 2025</div>

<!-- GITHUB -->
<a href="https://github.com/Atromost/Flowly-Notes" target="_blank" class="github-btn">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
  </svg>
  <span>GitHub</span>
  <div class="gh-badge">OSS</div>
</a>

<!-- MAIN -->
<div class="wrapper">

  <div class="eyebrow">Creative Suite — Est. 2025</div>

  <!-- BRAND NAME -->
  <div class="brand">
    <span class="brand-drawki">Drawki</span>
    <span class="brand-dot">·</span>
    <span class="brand-flow">Flow</span>
  </div>

  <!-- TOOL TAGLINE -->
  <div class="tagline">
    <span class="tagline-word tw-flowly">Flowly</span>
    <div class="tagline-sep"></div>
    <span class="tagline-word tw-drawki">Drawki</span>
    <div class="tagline-sep"></div>
    <span class="tagline-word tw-tempo">Tempo</span>
  </div>

  <!-- YOUR TOOLS ONE PLACE -->
  <div class="bottom-tag" style="margin-top:-8px; font-size:9px; letter-spacing:0.28em; color:rgba(255,255,255,0.18);">
    YOUR TOOLS &nbsp;·&nbsp; <span>ONE PLACE</span>
  </div>

  <!-- PILL BADGES -->
  <div class="badges">
    <div class="badge badge-flowly">Node Notes</div>
    <div class="badge badge-drawki">Freeform Canvas</div>
    <div class="badge badge-tempo">Precision Timer</div>
  </div>

  <div class="bottom-tag">
    <span>DRAWKIFLOW</span> &nbsp;·&nbsp; OPEN SOURCE &nbsp;·&nbsp; <span>2025</span>
  </div>

</div>

<!-- DOCK -->
<div class="dock-outer">
  <div class="dock-panel" id="dockPanel"></div>
</div>

<script>
/* ─── CURSOR ─── */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx = -100, my = -100, rx = -100, ry = -100;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function tick() {
  cursor.style.left = mx - 5 + 'px';
  cursor.style.top  = my - 5 + 'px';
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx - 16 + 'px';
  ring.style.top  = ry - 16 + 'px';
  requestAnimationFrame(tick);
})();

const enlargeRing = () => { ring.style.transform = 'scale(1.8)'; ring.style.opacity = '0.5'; };
const resetRing   = () => { ring.style.transform = 'scale(1)';   ring.style.opacity = '1'; };

document.querySelectorAll('.github-btn').forEach(el => {
  el.addEventListener('mouseenter', enlargeRing);
  el.addEventListener('mouseleave', resetRing);
});

/* ─── PARTICLES ─── */
const P = document.getElementById('particles');
const COLORS = ['#c8f135','#7c6ff7','#e8547a','#ff6b2b','#ffd166'];
for (let i = 0; i < 40; i++) {
  const d = document.createElement('div');
  d.className = 'p-dot';
  const s = Math.random() * 3 + 1.2;
  const c = COLORS[Math.floor(Math.random() * COLORS.length)];
  d.style.cssText = `width:${s}px;height:${s}px;background:${c};box-shadow:0 0 6px ${c};left:${Math.random()*100}%;bottom:${Math.random()*20-10}%;animation-duration:${7+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
  P.appendChild(d);
}

/* ══════════════════════════════════════════════
   DOCK — macOS spring magnification
══════════════════════════════════════════════ */
const DOCK_ITEMS = [
  {
    label: 'Flowly Notes',
    href: 'Flowlynotes.html',
    dotColor: '#c8f135',
    bg: 'rgba(200,241,53,0.10)',
    icon: `<svg width="26" height="26" viewBox="0 0 22 22" fill="none">
      <circle cx="4" cy="11" r="2.5" stroke="#c8f135" stroke-width="1.5"/>
      <circle cx="18" cy="5" r="2.5" stroke="#c8f135" stroke-width="1.5"/>
      <circle cx="18" cy="17" r="2.5" stroke="#c8f135" stroke-width="1.5"/>
      <circle cx="11" cy="11" r="2.5" stroke="#c8f135" stroke-width="1.5"/>
      <line x1="6.5" y1="11" x2="8.5" y2="11" stroke="#c8f135" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13.5" y1="11" x2="15.5" y2="7" stroke="#c8f135" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13.5" y1="11" x2="15.5" y2="15" stroke="#c8f135" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`
  },
  {
    label: 'DrawkiBoard',
    href: 'Drawkiboard.html',
    dotColor: '#7c6ff7',
    bg: 'rgba(124,111,247,0.10)',
    icon: `<svg width="26" height="26" viewBox="0 0 22 22" fill="none">
      <rect x="3" y="13" width="8" height="6" rx="1.5" stroke="#7c6ff7" stroke-width="1.5"/>
      <ellipse cx="16" cy="7" rx="4" ry="4" stroke="#7c6ff7" stroke-width="1.5"/>
      <line x1="9" y1="3" x2="13" y2="7" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
    </svg>`
  },
  {
    label: 'Tempo',
    href: 'stopwatch.html',
    dotColor: '#ff6b2b',
    bg: 'rgba(255,107,43,0.10)',
    icon: `<svg width="26" height="26" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="12" r="8" stroke="#ff6b2b" stroke-width="1.5"/>
      <rect x="9" y="2" width="4" height="2.5" rx="1" stroke="#ff6b2b" stroke-width="1.5"/>
      <line x1="11" y1="12" x2="11" y2="6.5" stroke="#ff6b2b" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="11" y1="12" x2="14.5" y2="14.5" stroke="#ff6b2b" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="11" cy="12" r="1.2" fill="#ff6b2b"/>
    </svg>`
  },
  { sep: true },
  {
    label: 'GitHub',
    href: 'https://github.com/Atromost/Flowly-Notes',
    external: true,
    dotColor: 'rgba(255,255,255,0.4)',
    bg: 'rgba(255,255,255,0.05)',
    icon: `<svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(255,255,255,0.55)">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
    </svg>`
  }
];

/* Physics constants */
const BASE      = 48;
const MAG       = 82;
const DISTANCE  = 180;
const STIFFNESS = 0.20;
const DAMPING   = 0.68;

const panel = document.getElementById('dockPanel');
const realItems = [];

DOCK_ITEMS.forEach(item => {
  if (item.sep) {
    const sep = document.createElement('div');
    sep.className = 'dock-sep';
    panel.appendChild(sep);
    return;
  }
  const el = document.createElement('a');
  el.className = 'dock-item';
  el.href = item.href;
  if (item.external) el.target = '_blank';
  el.style.background = item.bg;
  el.innerHTML = `
    ${item.icon}
    <div class="dock-label">${item.label}</div>
    <div class="dock-dot" style="background:${item.dotColor};"></div>
  `;
  panel.appendChild(el);
  el.addEventListener('mouseenter', enlargeRing);
  el.addEventListener('mouseleave', resetRing);
  realItems.push({ el, spring: { pos: BASE, vel: 0 } });
});

let dockMouseX = null;
panel.addEventListener('mousemove', e => { dockMouseX = e.clientX; });
panel.addEventListener('mouseleave', () => { dockMouseX = null; });

function getTarget(el) {
  if (dockMouseX === null) return BASE;
  const r    = el.getBoundingClientRect();
  const mid  = r.left + r.width / 2;
  const dist = Math.abs(dockMouseX - mid);
  if (dist >= DISTANCE) return BASE;
  const t = 1 - dist / DISTANCE;
  return BASE + (MAG - BASE) * t * t;
}

(function dockTick() {
  realItems.forEach(({ el, spring }) => {
    const target = getTarget(el);
    const force  = (target - spring.pos) * STIFFNESS;
    spring.vel   = (spring.vel + force) * DAMPING;
    spring.pos  += spring.vel;
    const sz = Math.max(BASE, spring.pos);
    el.style.width        = sz + 'px';
    el.style.height       = sz + 'px';
    el.style.borderRadius = Math.round(sz * 0.215) + 'px';
    const svgEl = el.querySelector('svg');
    if (svgEl) {
      const iconSz = Math.round(26 * (sz / BASE));
      svgEl.setAttribute('width',  Math.min(iconSz, 40));
      svgEl.setAttribute('height', Math.min(iconSz, 40));
    }
  });
  requestAnimationFrame(dockTick);
})();
</script>
