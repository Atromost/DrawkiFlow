<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiUse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

#cats {
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  gap: 10px;
  padding: 8px 0;

  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;

  /* 🔥 IMPORTANT */
  width: 100%;
}

#cats::-webkit-scrollbar {
  display: none;
}

.tab {
  flex: 0 0 auto;   /* 🔥 main fix */
  white-space: nowrap;
  padding: 6px 14px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f2eb;
  --ink: #0e0d0b;
  --ink-2: #3d3a34;
  --ink-3: #7c7870;
  --cream: #ede9df;
  --cream-2: #e4dfd5;
  --red: #c0392b;
  --red-soft: rgba(192,57,43,0.08);
  --border: rgba(14,13,11,0.1);
  --border-strong: rgba(14,13,11,0.2);
  --w: 620px;
}

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ─── MASTHEAD ─── */
.mast {
  max-width: var(--w);
  margin: 0 auto;
  padding: 48px 24px 0;
  animation: fadeDown 0.6s ease both;
}

.mast-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
}

.live-dot {
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  margin-top: 6px;
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(40px, 10vw, 64px);
  font-style: italic;
  letter-spacing: -2px;
  line-height: 1;
  color: var(--ink);
}

.dateline {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-top: 4px;
}

.mast-rule {
  height: 1px;
  background: var(--ink);
  margin: 16px 0 0;
}

.mast-rule-thin {
  height: 1px;
  background: var(--border);
  margin: 4px 0 0;
}

/* ─── TABS ─── */
.tabs-wrap {
  max-width: var(--w);
  margin: 0 auto;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  animation: fadeDown 0.6s 0.1s ease both;
}

.tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 14px 0 12px;
  border-bottom: 1px solid var(--border);
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border: 1px solid transparent;
  border-radius: 100px;
  cursor: pointer;
  background: none;
  color: var(--ink-3);
  white-space: nowrap;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.tab:hover {
  color: var(--ink);
  background: var(--cream);
}

.tab.on {
  color: var(--bg);
  background: var(--ink);
  border-color: var(--ink);
}

/* ─── FEED ─── */
.feed {
  max-width: var(--w);
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ─── LOADING ─── */
.loading {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 32px 0;
}

.skel {
  background: linear-gradient(90deg, var(--cream) 25%, var(--cream-2) 50%, var(--cream) 75%);
  background-size: 200% 100%;
  border-radius: 4px;
  animation: shimmer 1.4s ease infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── FEATURED ─── */
.featured {
  cursor: pointer;
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border-strong);
  animation: fadeUp 0.5s ease both;
}

.feat-kicker {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--red);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.feat-kicker::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--red);
  flex-shrink: 0;
}

.feat-img-wrap {
  width: 100%;
  aspect-ratio: 16/7;
  overflow: hidden;
  border-radius: 3px;
  margin-bottom: 18px;
  position: relative;
}

.feat-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transform: scale(1.02);
  transition: transform 0.6s ease;
}

.featured:hover .feat-img {
  transform: scale(1.06);
}

.feat-source {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.feat-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(24px, 5vw, 34px);
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--ink);
  margin-bottom: 12px;
  transition: color 0.2s;
}

.featured:hover .feat-title {
  color: var(--red);
}

.feat-desc {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-2);
  margin-bottom: 14px;
  font-weight: 400;
}

.feat-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
}

.feat-meta-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--ink-3);
}

.read-more {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 0;
  border-bottom: 1.5px solid var(--ink);
  transition: gap 0.2s ease;
}

.featured:hover .read-more {
  gap: 10px;
  color: var(--red);
  border-color: var(--red);
}

/* ─── SECTION LABEL ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 28px 0 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── ROW ─── */
.row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s ease;
  animation: fadeUp 0.4s ease both;
}

.row:hover {
  background: var(--cream);
  margin: 0 -16px;
  padding: 16px 16px;
  border-radius: 6px;
  border-color: transparent;
}

.row-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 300;
  color: var(--ink-3);
  min-width: 24px;
  padding-top: 2px;
  flex-shrink: 0;
}

.row-body { flex: 1; min-width: 0; }

.row-source {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.row-title {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  line-height: 1.35;
  color: var(--ink);
  letter-spacing: -0.2px;
  margin-bottom: 6px;
  transition: color 0.2s;
}

.row:hover .row-title { color: var(--red); }

.row-time {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
}

.row-thumb {
  width: 72px;
  height: 54px;
  object-fit: cover;
  border-radius: 3px;
  flex-shrink: 0;
  display: block;
  filter: grayscale(15%);
  transition: filter 0.3s;
}

.row:hover .row-thumb { filter: grayscale(0%); }

/* ─── ERROR ─── */
.err-state {
  padding: 40px 0;
  text-align: center;
}

.err-state p {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 16px;
}

.btn-retry {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--bg);
  border: none;
  padding: 10px 20px;
  border-radius: 100px;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.2s;
}

.btn-retry:hover { background: var(--red); transform: scale(1.03); }

/* ─── READER PANEL ─── */
.reader-bg {
  position: fixed;
  inset: 0;
  background: rgba(14,13,11,0);
  pointer-events: none;
  z-index: 100;
  transition: background 0.35s ease;
}

.reader-bg.open {
  background: rgba(14,13,11,0.5);
  pointer-events: all;
  backdrop-filter: blur(2px);
}

.reader {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: var(--w);
  max-height: 90vh;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.reader-bg.open .reader {
  transform: translateX(-50%) translateY(0);
}

.reader-handle {
  width: 36px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 14px auto 0;
  flex-shrink: 0;
}

.reader-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.r-back {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0;
  transition: color 0.2s;
  letter-spacing: 0.02em;
}

.r-back:hover { color: var(--red); }

.r-open {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-3);
  text-decoration: none;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1px;
  transition: color 0.2s;
}

.r-open:hover { color: var(--red); border-color: var(--red); }

.reader-body {
  overflow-y: auto;
  padding: 28px 28px 48px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
  flex: 1;
}

.r-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(22px, 5vw, 30px);
  line-height: 1.25;
  letter-spacing: -0.4px;
  margin-bottom: 20px;
  color: var(--ink);
}

.r-img {
  width: 100%;
  border-radius: 4px;
  display: block;
  margin-bottom: 20px;
}

.r-source {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--red);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.r-desc {
  font-size: 16px;
  line-height: 1.75;
  color: var(--ink-2);
  font-weight: 400;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.row:nth-child(1) { animation-delay: 0.05s; }
.row:nth-child(2) { animation-delay: 0.10s; }
.row:nth-child(3) { animation-delay: 0.15s; }
.row:nth-child(4) { animation-delay: 0.20s; }
.row:nth-child(5) { animation-delay: 0.25s; }
.row:nth-child(6) { animation-delay: 0.30s; }
.row:nth-child(7) { animation-delay: 0.35s; }
.row:nth-child(8) { animation-delay: 0.40s; }
.row:nth-child(9) { animation-delay: 0.45s; }
.row:nth-child(10) { animation-delay: 0.50s; }
</style>
</head>
<body>

<div class="mast">
  <div class="mast-top">
    <div class="logo">WikiUse</div>
    <div class="live-dot" title="Live"></div>
  </div>
  <div class="dateline" id="datestr"></div>
  <div class="mast-rule"></div>
  <div class="mast-rule-thin"></div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="cats"></div>
</div>

<div class="feed" id="feed"></div>

<!-- READER -->
<div class="reader-bg" id="rbg" onclick="handleBgClick(event)">
  <div class="reader" id="rpanel">
    <div class="reader-handle"></div>
    <div class="reader-bar">
      <button class="r-back" onclick="closeR()">← Back</button>
      <a class="r-open" id="rlink" target="_blank">Full Article ↗</a>
    </div>
    <div class="reader-body" id="rbody"></div>
  </div>
</div>
<script>
const CATS = [
  { name: 'Top News' },
  { name: 'Tech' },
  { name: 'Science' },
  { name: 'World' },
  { name: 'Business' },
  { name: 'Sports' },
  { name: 'Health' },
  { name: 'Nation' },
];

const RSS = [
  "https://feeds.bbci.co.uk/news/rss.xml",
  "https://feeds.bbci.co.uk/news/technology/rss.xml",
  "https://feeds.bbci.co.uk/news/science_and_environment/rss.xml",
  "https://feeds.bbci.co.uk/news/world/rss.xml",
  "https://feeds.bbci.co.uk/news/business/rss.xml",
  "https://feeds.bbci.co.uk/sport/rss.xml",
  "https://feeds.bbci.co.uk/news/health/rss.xml",
  "https://feeds.bbci.co.uk/news/uk/rss.xml"
];

let cur = 0, arts = [];

/* DATE */
document.getElementById('datestr').textContent =
  new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }).toUpperCase();

/* TABS */
function buildTabs() {
  const el = document.getElementById('cats');
  el.innerHTML = '';

  CATS.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i === cur ? ' on' : '');
    b.textContent = c.name;

    b.onclick = () => {
      cur = i;
      buildTabs();
      load();

      setTimeout(() => {
        b.scrollIntoView({
          behavior: "smooth",
          inline: "center"
        });
      }, 50);
    };

    el.appendChild(b);
  });
}

/* TIME */
function ago(str) {
  const m = Math.floor((Date.now() - new Date(str)) / 60000);
  if (m < 1) return 'Just now';
  if (m < 60) return m + 'm ago';
  if (m < 1440) return Math.floor(m / 60) + 'h ago';
  return Math.floor(m / 1440) + 'd ago';
}

/* CLEAN HTML */
function cleanHTML(html) {
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.textContent || "";
}

/* SKELETON */
function showSkeleton() {
  document.getElementById('feed').innerHTML =
    '<div class="loading">Loading fresh news...</div>';
}

/* LOAD */
async function load() {
  showSkeleton();

  try {
    const url =
      "https://api.rss2json.com/v1/api.json?rss_url=" +
      encodeURIComponent(RSS[cur]) +
      "&_=" + Math.random();

    const res = await fetch(url);
    const data = await res.json();

    if (!data.items || !data.items.length) throw new Error("No data");

    arts = data.items
      .sort(() => 0.5 - Math.random())
      .slice(0, 20)
      .map(item => {
        const desc = cleanHTML(item.description || "");
        const full = cleanHTML(item.content || item.description || "");

        return {
          title: item.title,
          description: desc,
          full: full,
          url: item.link,
          urlToImage: item.thumbnail || "",
          publishedAt: item.pubDate,
          source: { name: item.author || "BBC News" }
        };
      });

    render();

  } catch (e) {
    console.error(e);
    document.getElementById('feed').innerHTML =
      `<div class="err-state">Failed to load</div>`;
  }
}

/* RENDER */
function render() {
  const feed = document.getElementById('feed');

  if (!arts.length) {
    feed.innerHTML = `<div class="err-state">No data</div>`;
    return;
  }

  const [top, ...rest] = arts;

  let h = `
  <div class="featured" onclick="openArt(0)">
    ${top.urlToImage ? `<div class="feat-img-wrap"><img class="feat-img" src="${top.urlToImage}"></div>` : ''}
    <div class="feat-source">${top.source.name}</div>
    <div class="feat-title">${top.title}</div>
    <div class="feat-desc">${top.description}</div>
    <div class="feat-meta">${ago(top.publishedAt)}</div>
  </div>
  <div class="section-label">More Stories</div>
  `;

  rest.forEach((a, i) => {
    h += `
    <div class="row" onclick="openArt(${i+1})">
      <div class="row-num">${i+1}</div>
      <div class="row-body">
        <div class="row-source">${a.source.name}</div>
        <div class="row-title">${a.title}</div>
        <div class="row-time">${ago(a.publishedAt)}</div>
      </div>
      ${a.urlToImage ? `<img class="row-thumb" src="${a.urlToImage}">` : ''}
    </div>`;
  });

  feed.innerHTML = h;
}

/* OPEN ARTICLE (NO DUPLICATE TEXT) */
function openArt(i) {
  const a = arts[i];

  const link = document.getElementById('rlink');
  link.href = a.url;
  link.target = "_blank";
  link.rel = "noopener";

  // 🔥 1) clean text
  let raw = (a.full || a.description || "")
    .replace(/\s+/g, " ")
    .replace(/(\r\n|\n|\r)/gm, " ")
    .trim();

  // 🔥 2) split into sentences (robust)
  let sentences = raw
    .split(/(?<=[.?!])\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 30); // junk remove

  // 🔥 3) strict dedupe (normalized)
  const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim();
  let unique = [];
  let seen = new Set();

  for (let s of sentences) {
    const key = norm(s);
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(s);
    }
  }

  // 🔥 4) keep ONLY unique sentences (no repeat, no padding)
  // max 6–8 lines for readability
  let picked = unique.slice(0, 8);

  // अगर बहुत कम है, तो जितना है उतना ही दिखाओ (no fake repeat)
  let finalText = picked.join(" ");

  // 🔥 5) paragraph format (2–3 sentences per para)
  let paras = [];
  for (let i = 0; i < picked.length; i += 2) {
    paras.push(picked.slice(i, i + 2).join(" "));
  }

  let paragraphsHTML = paras
    .map(p => `<p>${p}</p>`)
    .join("");

  document.getElementById('rbody').innerHTML = `
    <div class="r-source">${a.source.name}</div>
    <div class="r-title">${a.title}</div>
    ${a.urlToImage ? `<img class="r-img" src="${a.urlToImage}">` : ''}
    <div class="r-content">
      ${paragraphsHTML || `<p>${finalText}</p>`}
    </div>
    <a href="${a.url}" target="_blank" rel="noopener" style="display:block;margin-top:12px">
      Read full article →
    </a>
  `;

  document.getElementById('rbg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
/* CLOSE */
function closeR() {
  document.getElementById('rbg').classList.remove('open');
  document.body.style.overflow = '';
}

/* BACKGROUND CLICK */
function handleBgClick(e) {
  const panel = document.getElementById('rpanel');
  if (panel.contains(e.target)) return;
  closeR();
}

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById('rpanel').addEventListener('click', e => {
    e.stopPropagation();
  });

  buildTabs();
  load();
});
</script>
</body>
</html>
